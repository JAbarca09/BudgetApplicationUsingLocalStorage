<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Jesse's Budgeting App</title>
  </head>
  <body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 text-center">
                <h1 class="">Jesse's Budget App</h1>
            </div>
        </div>
        <div class="row mt-3">
          <div class="col-auto">
            <label for="inputBudget" class="visually-hidden">Enter Budget</label>
            <input type="number" class="form-control" id="inputBudget" min="0" placeholder="Enter Budget">
          </div>
          <div class="col-auto">
            <button type="submit" id="enterBudgetBtn" class="btn btn-danger mb-3">Enter Budget</button>
          </div>
        </div>
        <div class="row mt-1">
          <div class="col-12">
            <label for="inputVendor" class="visually-hidden">Specify Vendor</label>
            <input type="text" class="form-control" id="inputVendor" placeholder="Specify Vendor">
          </div>
        </div>
        <div class="row mt-4">
          <div class="col-12">
            <label for="inputAmountSpent" class="visually-hidden">Amount Spent</label>
            <input type="number" class="form-control" id="inputAmountSpent" placeholder="Amount Spent">
          </div>
        </div>
        <div class="row">
          <div class="col-12 mt-4 d-flex justify-content-center">
            <button type="submit" id="enterVenderAmountSpentBtn" class="btn btn-danger mb-3">Enter Vender and Amount Spent</button>
          </div>
        </div>
        <div class="row">
          <div class="col-12 text-center">
            <h1>Expenses</h1>
          </div>
        </div>
        <div id="injectHere" class="row">
          <!--Inject your element here!-->
          <!-- <div class="row justify-content-center mt-3">
            <div class="col-2">
              <p class="createElementPtagTxt">Steam</p>
            </div>
            <div class="col-2 p-0"></div>
            <div class="col-5 p-0">
              <p class="createElementPtagTxt">$500</p>
            </div>
            <div class="col-1"> -->
              <!--Enter your icon here-->
              <!-- <button type="button" class="btn btn-danger pt-1 pb-1">X</button>
            </div>
          </div>
          <hr class="horizontalLine"/> -->
        </div>
        <div class="row mt-5">
          <div class="col-4">
            <h1>Balance:</h1>
          </div>
          <div class="col-4">
            <h1 id="Balance"></h1>
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-5">
            <h1>Expenses:</h1>
          </div>
          <div class="col-4">
            <h1 id="Expenses"></h1>
          </div>
        </div>
    </div><!--End of the container-->
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="./scripts/app.js" type="module"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
  </body>
</html>
